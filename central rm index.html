<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RM Sistemas</title>
<meta name="theme-color" content="#f2f2ef">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f2ef; --surface:#ffffff; --surface-2:#f6f6f3;
    --line:#e4e4e0; --line-2:#d3d3cd;
    --grid:rgba(0,0,0,.038);
    --ink:#1b1b1f; --steel:#8a8a90; --steel-2:#5f5f66;
    --accent:#aa221f; --accent-2:#cf3a33;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 10px 26px rgba(0,0,0,.05);
    --shadow-h:0 2px 4px rgba(0,0,0,.06),0 16px 34px rgba(0,0,0,.10);
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--ink);background-color:var(--bg);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:32px 32px;-webkit-font-smoothing:antialiased;
    height:100vh;display:flex;flex-direction:column;overflow:hidden;
  }
  .wm{position:fixed;inset:0;z-index:0;pointer-events:none;background:url('logo-bg.png') no-repeat center center;background-size:cover;opacity:.10}

  /* ---- Top bar (carimbo) ---- */
  .titleblock{position:relative;z-index:2;display:flex;align-items:stretch;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--line)}
  .tb-brand{display:flex;align-items:center;gap:16px;padding:11px 22px;border-right:1px solid var(--line)}
  .logo{height:48px;width:auto;display:block}
  .bdiv{width:1px;height:34px;background:var(--line)}
  .appname{font-family:var(--mono);font-size:10px;color:var(--steel);letter-spacing:2px;text-transform:uppercase;line-height:1.5}
  .tb-cells{display:flex}
  .cell{padding:10px 18px;border-left:1px solid var(--line);min-width:96px;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .cell .lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--steel);text-transform:uppercase}
  .cell .val{font-family:var(--mono);font-size:13px;color:var(--steel-2);font-weight:500;white-space:nowrap}
  .cell .val.live{color:var(--ink)}

  /* ---- Tab bar ---- */
  .tabbar{position:relative;z-index:2;display:flex;align-items:stretch;background:var(--surface);border-bottom:1px solid var(--line);padding:0 8px;overflow-x:auto}
  .tab{display:inline-flex;align-items:center;gap:8px;padding:0 14px;height:42px;border:0;background:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--steel-2);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .tab .ti{display:grid;place-items:center;color:var(--accent)}
  .tab .ti svg{width:16px;height:16px;display:block}
  .tab .close{margin-left:2px;width:18px;height:18px;border-radius:4px;display:grid;place-items:center;color:var(--steel);font-size:15px;line-height:1}
  .tab .close:hover{background:rgba(0,0,0,.07);color:var(--accent)}
  .spacer{flex:1 0 8px}
  .popout{height:42px;padding:0 14px;border:0;background:none;cursor:pointer;color:var(--steel);font-size:16px;font-family:var(--sans);transition:color .15s}
  .popout:hover{color:var(--accent)}
  .popout[disabled]{opacity:.35;cursor:default}

  /* ---- Stage ---- */
  .stage{position:relative;flex:1;min-height:0;z-index:1}
  .view{position:absolute;inset:0;display:none}
  .view.active{display:block}
  .view.home{overflow:auto}
  .view iframe{width:100%;height:100%;border:0;display:block;background:#fff}
  .inner{max-width:1140px;margin:0 auto;padding:28px 28px 56px}

  .eyebrow{display:flex;align-items:center;gap:12px;margin:4px 2px 18px;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--steel);text-transform:uppercase}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
  .eyebrow b{color:var(--accent);font-weight:700}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:18px}
  .plate{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:22px;cursor:pointer;text-align:left;width:100%;color:inherit;font-family:inherit;display:flex;flex-direction:column;gap:16px;min-height:240px;box-shadow:var(--shadow);transition:transform .16s,border-color .16s,box-shadow .16s}
  .plate::before,.plate::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--accent);opacity:0;transition:opacity .16s,transform .16s}
  .plate::before{top:8px;left:8px;border-right:0;border-bottom:0;transform:translate(3px,3px)}
  .plate::after{bottom:8px;right:8px;border-left:0;border-top:0;transform:translate(-3px,-3px)}
  .plate:hover{transform:translateY(-3px);border-color:var(--line-2);box-shadow:var(--shadow-h)}
  .plate:hover::before,.plate:hover::after{opacity:1;transform:translate(0,0)}
  .plate:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .p-top{display:flex;align-items:center;justify-content:space-between}
  .p-cat{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase}
  .p-reg{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--steel);text-transform:uppercase}
  .tile{width:58px;height:58px;border-radius:13px;border:1px solid var(--line-2);background:var(--surface-2);display:grid;place-items:center;color:var(--accent);transition:background .16s,border-color .16s,color .16s}
  .tile svg{width:29px;height:29px}
  .plate:hover .tile{background:var(--accent);border-color:var(--accent);color:#fff}
  .p-name{font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1.15;color:var(--ink)}
  .p-desc{font-size:13px;color:var(--steel-2);line-height:1.5;flex:1}
  .p-open{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--steel-2);border:1px solid var(--line-2);border-radius:3px;padding:8px 14px;transition:color .16s,border-color .16s,background .16s}
  .p-open i{font-style:normal;transition:transform .16s}
  .plate:hover .p-open{color:var(--accent);border-color:var(--accent);background:rgba(170,34,31,.06)}
  .plate:hover .p-open i{transform:translateX(4px)}

  .home-foot{margin-top:34px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--steel);text-transform:uppercase}
  .home-foot .rule{height:1px;background:var(--line);margin-bottom:14px}

  @media (max-width:760px){
    .titleblock{flex-wrap:wrap}
    .tb-brand{border-right:0;flex:1 1 100%;border-bottom:1px solid var(--line)}
    .tb-cells{width:100%;overflow-x:auto}
    .cell{flex:1}
    .inner{padding:22px 16px 50px}
  }
</style>
</head>
<body>
  <div class="wm"></div>

  <header class="titleblock">
    <div class="tb-brand">
      <img class="logo" src="logo-bg.png" alt="RM Estruturas Pré-Fabricadas">
      <span class="bdiv"></span>
      <span class="appname">Central de<br>Aplicativos</span>
    </div>
    <div class="tb-cells">
      <div class="cell"><span class="lbl">Local</span><span class="val">Estrela · RS</span></div>
      <div class="cell"><span class="lbl">Data</span><span class="val live" id="tbDate">—</span></div>
      <div class="cell"><span class="lbl">Hora</span><span class="val live" id="tbTime">—</span></div>
    </div>
  </header>

  <nav class="tabbar" id="tabbar">
    <button class="tab active" id="homeTab">
      <span class="ti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v9h14v-9"/></svg></span>
      <span class="tx">Início</span>
    </button>
    <span class="spacer" id="spacer"></span>
    <button class="popout" id="popoutBtn" title="Abrir o sistema atual em janela separada" disabled>↗</button>
  </nav>

  <main class="stage" id="stage">
    <section class="view home active" id="home">
      <div class="inner">
        <div class="eyebrow">Sistemas · <b id="modCount">05</b> módulos</div>
        <div class="grid" id="grid"></div>
        <div class="home-foot"><div class="rule"></div>RM Estruturas Pré-Fabricadas · Nunes e Kuhn Estruturas Metálicas</div>
      </div>
    </section>
  </main>

<script>
const ICON = {
  orcamento:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><rect x="8" y="6" width="8" height="3.5" rx="1"/><line x1="8.5" y1="14" x2="9.5" y2="14"/><line x1="11.5" y1="14" x2="12.5" y2="14"/><line x1="14.5" y1="14" x2="15.5" y2="14"/><line x1="8.5" y1="17.5" x2="9.5" y2="17.5"/><line x1="11.5" y1="17.5" x2="12.5" y2="17.5"/><line x1="14.5" y1="17.5" x2="15.5" y2="17.5"/></svg>`,
  pu:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c0 0-6 6.5-6 11a6 6 0 0 0 12 0c0-4.5-6-11-6-11Z"/><path d="M9 14.5a3 3 0 0 0 1.8 2.6"/></svg>`,
  perfitec:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12"/><path d="M6 20h12"/><path d="M12 4v16"/><path d="M7 4v2"/><path d="M17 4v2"/><path d="M7 18v2"/><path d="M17 18v2"/></svg>`,
  obras:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18.5h18"/><path d="M5.5 18.5v-1a6.5 6.5 0 0 1 13 0v1"/><path d="M12 11V8.2"/><path d="M9 18.5v-6"/><path d="M15 18.5v-6"/></svg>`,
  cheques:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><line x1="6" y1="10" x2="11" y2="10"/><line x1="6" y1="13" x2="9" y2="13"/><path d="M13.5 15c1-1.6 2-1.6 3 0s2 1.6 3 0"/></svg>`,
  corte:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h20"/><path d="M3 18L12 5l9 13"/><path d="M12 5v13"/><path d="M7.5 11.5L12 18"/><path d="M16.5 11.5L12 18"/></svg>`
};

const SISTEMAS = [
  { code:"OR", reg:"SYS · 01", cat:"Comercial",   icon:ICON.orcamento, nome:"Orçamento RM",       desc:"Orçamentos e propostas comerciais.",   url:"https://evertonluis4523-afk.github.io/orcamento-rm/" },
  { code:"PU", reg:"SYS · 02", cat:"Operacional", icon:ICON.pu,        nome:"Controle de PU",     desc:"Aplicação de poliuretano nas juntas.", url:"https://evertonluis4523-afk.github.io/calculadora-pu/" },
  { code:"PF", reg:"SYS · 03", cat:"Suprimentos", icon:ICON.perfitec,  nome:"Controle Perfitec",  desc:"Cotação de perfis de aço e telhas.",    url:"https://evertonluis4523-afk.github.io/Pedidos_perfitec/" },
  { code:"OB", reg:"SYS · 04", cat:"Operacional", icon:ICON.obras,     nome:"Controle de Obras",  desc:"Painel de acompanhamento de obras.",    url:"https://evertonluis4523-afk.github.io/controle_obras/" },
  { code:"CH", reg:"SYS · 05", cat:"Financeiro",  icon:ICON.cheques,   nome:"Controle de Cheques",desc:"Emissão e compensação de cheques.",     url:"https://evertonluis4523-afk.github.io/controle_cheques/" },
  { code:"CE", reg:"SYS · 06", cat:"Engenharia",  icon:ICON.corte,     nome:"Corte de Estruturas",desc:"Levantamento de material para tesouras a partir do DWG.", url:"https://evertonluis4523-afk.github.io/leitor_dwg/" }
];

const stage=document.getElementById('stage'), tabbar=document.getElementById('tabbar'),
      spacer=document.getElementById('spacer'), homeTab=document.getElementById('homeTab'),
      homeView=document.getElementById('home'), popoutBtn=document.getElementById('popoutBtn'),
      grid=document.getElementById('grid');
const open={}; let current='home';
document.getElementById('modCount').textContent=String(SISTEMAS.length).padStart(2,'0');
const byCode=c=>SISTEMAS.find(s=>s.code===c);

function activate(code){
  current=code;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(code==='home'){ homeView.classList.add('active'); homeTab.classList.add('active'); }
  else { open[code].view.classList.add('active'); open[code].tab.classList.add('active'); }
  popoutBtn.disabled = (code==='home');
}

function openSystem(s){
  if(!s.url||s.url==='#'){ alert('Falta cadastrar o endereco de "'+s.nome+'".'); return; }
  if(!open[s.code]){
    const v=document.createElement('section'); v.className='view';
    const f=document.createElement('iframe'); f.src=s.url; f.title=s.nome; f.setAttribute('allow','clipboard-write');
    v.appendChild(f); stage.appendChild(v);
    const t=document.createElement('button'); t.className='tab';
    t.innerHTML='<span class="ti">'+s.icon+'</span><span class="tx">'+s.nome+'</span><span class="close" title="Fechar">×</span>';
    t.addEventListener('click',e=>{ if(e.target.closest('.close')){ e.stopPropagation(); closeSystem(s.code); return; } activate(s.code); });
    tabbar.insertBefore(t, spacer);
    open[s.code]={tab:t,view:v};
  }
  activate(s.code);
}

function closeSystem(code){
  const o=open[code]; if(!o)return;
  o.tab.remove(); o.view.remove(); delete open[code];
  if(current===code) activate('home');
}

homeTab.addEventListener('click',()=>activate('home'));
popoutBtn.addEventListener('click',()=>{
  if(current==='home')return;
  const s=byCode(current), aw=screen.availWidth||1440, ah=screen.availHeight||900;
  const w=window.open(s.url,'rm-popout-'+current,'popup=yes,width='+aw+',height='+ah+',left=0,top=0');
  if(w) w.focus();
});

SISTEMAS.forEach(s=>{
  const el=document.createElement('button'); el.className='plate';
  el.innerHTML=
    '<div class="p-top"><span class="p-cat">'+s.cat+'</span><span class="p-reg">'+s.reg+'</span></div>'+
    '<div class="tile">'+s.icon+'</div>'+
    '<div class="p-name">'+s.nome+'</div>'+
    '<div class="p-desc">'+s.desc+'</div>'+
    '<span class="p-open">Abrir <i>→</i></span>';
  el.addEventListener('click',()=>openSystem(s));
  grid.appendChild(el);
});

function tick(){
  const d=new Date(), m=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
  document.getElementById('tbDate').textContent=String(d.getDate()).padStart(2,'0')+" "+m[d.getMonth()]+" "+d.getFullYear();
  document.getElementById('tbTime').textContent=String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,15000);
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
