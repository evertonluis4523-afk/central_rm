<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RM Sistemas</title>
<meta name="theme-color" content="#f2f2ef">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f2ef; --surface:#ffffff; --surface-2:#f6f6f3;
    --line:#e4e4e0; --line-2:#d3d3cd;
    --grid:rgba(0,0,0,.038);
    --ink:#1b1b1f; --steel:#8a8a90; --steel-2:#5f5f66;
    --accent:#aa221f; --accent-2:#cf3a33;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 10px 26px rgba(0,0,0,.05);
    --shadow-h:0 2px 4px rgba(0,0,0,.06),0 16px 34px rgba(0,0,0,.10);
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);color:var(--ink);background-color:var(--bg);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:32px 32px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;
  }
  .wm{position:fixed;inset:0;z-index:0;pointer-events:none;background:url('logo-bg.png') no-repeat center center;background-size:cover;opacity:.10}
  .sheet{width:100%;max-width:1140px;margin:0 auto;position:relative;z-index:1;padding:26px 28px 70px;padding-top:calc(26px + env(safe-area-inset-top));flex:1;display:flex;flex-direction:column}
  .crop{position:absolute;width:14px;height:14px;border:1.5px solid var(--line-2);pointer-events:none}
  .crop.tl{top:14px;left:14px;border-right:0;border-bottom:0}
  .crop.tr{top:14px;right:14px;border-left:0;border-bottom:0}
  .crop.bl{bottom:14px;left:14px;border-right:0;border-top:0}
  .crop.br{bottom:14px;right:14px;border-left:0;border-top:0}

  /* ----- Carimbo ----- */
  .titleblock{display:flex;align-items:stretch;justify-content:space-between;border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow)}
  .tb-brand{display:flex;align-items:center;gap:14px;padding:16px 20px;border-right:1px solid var(--line)}
  .mark{width:44px;height:44px;border-radius:10px;background:var(--accent);display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:17px;color:#fff}
  .tb-brand h1{font-size:19px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;line-height:1;color:var(--ink)}
  .tb-brand .sub{font-family:var(--mono);font-size:10px;color:var(--steel);letter-spacing:2px;text-transform:uppercase;margin-top:5px}
  .tb-cells{display:flex}
  .cell{padding:14px 18px;border-right:1px solid var(--line);min-width:98px;display:flex;flex-direction:column;justify-content:center;gap:4px}
  .cell:last-child{border-right:0}
  .cell .lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--steel);text-transform:uppercase}
  .cell .val{font-family:var(--mono);font-size:13px;color:var(--steel-2);font-weight:500;white-space:nowrap}
  .cell .val.live{color:var(--ink)}

  .eyebrow{display:flex;align-items:center;gap:12px;margin:30px 2px 18px;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--steel);text-transform:uppercase}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
  .eyebrow b{color:var(--accent);font-weight:700}

  /* ----- Cards ----- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(264px,1fr));gap:18px}
  .plate{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:22px;cursor:pointer;text-align:left;width:100%;color:inherit;font-family:inherit;display:flex;flex-direction:column;gap:16px;min-height:248px;box-shadow:var(--shadow);transition:transform .16s,border-color .16s,box-shadow .16s;opacity:0;transform:translateY(10px);animation:rise .5s ease forwards}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  .plate::before,.plate::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--accent);opacity:0;transition:opacity .16s,transform .16s}
  .plate::before{top:8px;left:8px;border-right:0;border-bottom:0;transform:translate(3px,3px)}
  .plate::after{bottom:8px;right:8px;border-left:0;border-top:0;transform:translate(-3px,-3px)}
  .plate:hover{transform:translateY(-3px);border-color:var(--line-2);box-shadow:var(--shadow-h)}
  .plate:hover::before,.plate:hover::after{opacity:1;transform:translate(0,0)}
  .plate:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

  .p-top{display:flex;align-items:center;justify-content:space-between}
  .p-cat{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase}
  .p-reg{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;color:var(--steel);text-transform:uppercase}
  .tile{width:60px;height:60px;border-radius:13px;border:1px solid var(--line-2);background:var(--surface-2);display:grid;place-items:center;color:var(--accent);transition:background .16s,border-color .16s,color .16s}
  .tile svg{width:30px;height:30px}
  .plate:hover .tile{background:var(--accent);border-color:var(--accent);color:#fff}
  .p-name{font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1.15;color:var(--ink)}
  .p-desc{font-size:13px;color:var(--steel-2);line-height:1.5;flex:1}
  .p-open{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--steel-2);border:1px solid var(--line-2);border-radius:3px;padding:8px 14px;transition:color .16s,border-color .16s,background .16s}
  .p-open i{font-style:normal;transition:transform .16s}
  .plate:hover .p-open{color:var(--accent);border-color:var(--accent);background:rgba(170,34,31,.06)}
  .plate:hover .p-open i{transform:translateX(4px)}

  footer{margin-top:auto;padding-top:32px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--steel);text-transform:uppercase}
  footer .rule{height:1px;background:var(--line);margin-bottom:14px}

  @media (max-width:760px){
    .titleblock{flex-direction:column}
    .tb-brand{border-right:0;border-bottom:1px solid var(--line)}
    .tb-cells{overflow-x:auto}
    .crop{display:none}
    .sheet{padding:20px 16px 60px}
  }
  @media (prefers-reduced-motion:reduce){.plate{animation:none;opacity:1;transform:none}*{transition:none !important}}
</style>
</head>
<body>
  <div class="wm"></div>
  <div class="sheet">
    <span class="crop tl"></span><span class="crop tr"></span><span class="crop bl"></span><span class="crop br"></span>

    <header class="titleblock">
      <div class="tb-brand">
        <div class="mark">RM</div>
        <div><h1>RM Sistemas</h1><div class="sub">Central de Aplicativos</div></div>
      </div>
      <div class="tb-cells">
        <div class="cell"><span class="lbl">Local</span><span class="val">Estrela · RS</span></div>
        <div class="cell"><span class="lbl">Data</span><span class="val live" id="tbDate">—</span></div>
        <div class="cell"><span class="lbl">Hora</span><span class="val live" id="tbTime">—</span></div>
      </div>
    </header>

    <div class="eyebrow">Sistemas · <b id="modCount">05</b> módulos</div>
    <div class="grid" id="grid"></div>

    <footer><div class="rule"></div>RM Estruturas Pré-Fabricadas · Nunes e Kuhn Estruturas Metálicas</footer>
  </div>

<script>
const ICON = {
  orcamento:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"/><rect x="8" y="6" width="8" height="3.5" rx="1"/><line x1="8.5" y1="14" x2="9.5" y2="14"/><line x1="11.5" y1="14" x2="12.5" y2="14"/><line x1="14.5" y1="14" x2="15.5" y2="14"/><line x1="8.5" y1="17.5" x2="9.5" y2="17.5"/><line x1="11.5" y1="17.5" x2="12.5" y2="17.5"/><line x1="14.5" y1="17.5" x2="15.5" y2="17.5"/></svg>`,
  pu:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c0 0-6 6.5-6 11a6 6 0 0 0 12 0c0-4.5-6-11-6-11Z"/><path d="M9 14.5a3 3 0 0 0 1.8 2.6"/></svg>`,
  perfitec:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12"/><path d="M6 20h12"/><path d="M12 4v16"/><path d="M7 4v2"/><path d="M17 4v2"/><path d="M7 18v2"/><path d="M17 18v2"/></svg>`,
  obras:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18.5h18"/><path d="M5.5 18.5v-1a6.5 6.5 0 0 1 13 0v1"/><path d="M12 11V8.2"/><path d="M9 18.5v-6"/><path d="M15 18.5v-6"/></svg>`,
  cheques:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><line x1="6" y1="10" x2="11" y2="10"/><line x1="6" y1="13" x2="9" y2="13"/><path d="M13.5 15c1-1.6 2-1.6 3 0s2 1.6 3 0"/></svg>`
};

const SISTEMAS = [
  { reg:"SYS · 01", cat:"Comercial",   icon:ICON.orcamento, nome:"Orçamento RM",       desc:"Orçamentos e propostas comerciais.",   url:"https://evertonluis4523-afk.github.io/orcamento-rm/" },
  { reg:"SYS · 02", cat:"Operacional", icon:ICON.pu,        nome:"Controle de PU",     desc:"Aplicação de poliuretano nas juntas.", url:"https://evertonluis4523-afk.github.io/calculadora-pu/" },
  { reg:"SYS · 03", cat:"Suprimentos", icon:ICON.perfitec,  nome:"Controle Perfitec",  desc:"Cotação de perfis de aço e telhas.",    url:"https://evertonluis4523-afk.github.io/Pedidos_perfitec/" },
  { reg:"SYS · 04", cat:"Operacional", icon:ICON.obras,     nome:"Controle de Obras",  desc:"Painel de acompanhamento de obras.",    url:"https://evertonluis4523-afk.github.io/controle_obras/" },
  { reg:"SYS · 05", cat:"Financeiro",  icon:ICON.cheques,   nome:"Controle de Cheques",desc:"Emissão e compensação de cheques.",     url:"https://evertonluis4523-afk.github.io/controle_cheques/" }
];

const grid = document.getElementById("grid");
document.getElementById("modCount").textContent = String(SISTEMAS.length).padStart(2,"0");
SISTEMAS.forEach((s,i) => {
  const el = document.createElement("button");
  el.className = "plate"; el.style.animationDelay = (i*70) + "ms";
  el.innerHTML =
    '<div class="p-top"><span class="p-cat">'+s.cat+'</span><span class="p-reg">'+s.reg+'</span></div>'+
    '<div class="tile">'+s.icon+'</div>'+
    '<div class="p-name">'+s.nome+'</div>'+
    '<div class="p-desc">'+s.desc+'</div>'+
    '<span class="p-open">Abrir <i>→</i></span>';
  el.addEventListener("click", () => {
    if (!s.url || s.url === "#"){ alert('Falta cadastrar o endereco de "'+s.nome+'".'); return; }
    const aw = screen.availWidth||1440, ah = screen.availHeight||900;
    const W = Math.min(1400, aw-80), H = Math.min(900, ah-80);
    const L = Math.round((aw-W)/2), T = Math.round((ah-H)/2);
    // janela única "rm-sistema": reaproveitada a cada clique, não acumula abas
    const win = window.open(s.url, "rm-sistema", "popup=yes,width="+W+",height="+H+",left="+L+",top="+T);
    if (win) win.focus();
  });
  grid.appendChild(el);
});

function tick(){
  const d=new Date(), m=["JAN","FEV","MAR","ABR","MAI","JUN","JUL","AGO","SET","OUT","NOV","DEZ"];
  document.getElementById("tbDate").textContent=String(d.getDate()).padStart(2,"0")+" "+m[d.getMonth()]+" "+d.getFullYear();
  document.getElementById("tbTime").textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
tick(); setInterval(tick,15000);
if ("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
